     function irPorTodo() {
        irPorAlgo();

     async function irPorAlgo() {
        try {
                const respuesta = await fetch("https://api.thedogapi.com/v1/breeds?limit=2",      {
                method: "GET", 
                headers: {
                    "x-api-key": "live_Ng9jMLlZaAX1wLzrVwFzJ69TEcz42tk7bWrhNe1xtZlQKi3UDg2FUkqKx3mwEHrO"
                }
        });
            if (!respuesta.ok) {
            console.log("Error");
            //throw new Error("Error");
            }
            const data = await respuesta.json();
            console.log(data);
            let d = document.getElementById("bio");
            let bio = document.createElement("p");
            bio.textContent = data[0].name;
            d.appendChild(bio);
        } catch (error) {
            console.error("Error:", error.message);
        }
    }

         async function irPorImagen() {
        try {
                const respuesta = await fetch("https://api.thedogapi.com/v1/images/search?limit=1",      {
                method: "GET", 
                headers: {
                    "x-api-key": "live_Ng9jMLlZaAX1wLzrVwFzJ69TEcz42tk7bWrhNe1xtZlQKi3UDg2FUkqKx3mwEHrO"
                }
        });
            if (!respuesta.ok) {
            console.log("Error");
            //throw new Error("Error");
            }
            const data = await respuesta.json();
            console.log(data);
            let d = document.getElementById("img");
            img.src = data[0].url;
            img.style.width = "200px";
            d.appendChild(img);
        } catch (error) {
            console.error("Error:", error.message);
        }
    }

    async function Votar(value) {
        const res = await fetch("https://api.thedogapi.com/v1/votes", {
            method: "POST",
            headers: {
            "Content-Type": "application/json",
             "x-api-key": "live_Ng9jMLlZaAX1wLzrVwFzJ69TEcz42tk7bWrhNe1xtZlQKi3UDg2FUkqKx3mwEHrO"
            },
            body: JSON.stringify({
            image_id: document.getElementById("img").src.split("/").pop().split(".")[0], // Obtener el ID de la imagen
            value: value
            })
        });
          const data = await res.json();
        console.log("Voto enviado:", data);

        // Cargar otra imagen después de votar
        irPorImagen();
        }
